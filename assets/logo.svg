<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="t">
  <title id="t">Agent-Notify logo</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset=".55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E0E7FF"/>
    </linearGradient>
    <radialGradient id="gloss" cx=".3" cy=".25" r=".85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".35"/>
      <stop offset=".6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#gloss)"/>

  <!-- ringing sound waves -->
  <g fill="none" stroke="#67E8F9" stroke-width="6" stroke-linecap="round">
    <path d="M188 110 Q200 128 188 146"/>
    <path d="M202 99 Q220 128 202 157" opacity=".7"/>
    <path d="M68 110 Q56 128 68 146"/>
    <path d="M54 99 Q36 128 54 157" opacity=".7"/>
  </g>

  <!-- antenna + ping -->
  <path d="M128 78 V56" fill="none" stroke="#C7D2FE" stroke-width="6" stroke-linecap="round"/>
  <circle cx="128" cy="46" r="17" fill="#FB7185" opacity=".35"/>
  <circle cx="128" cy="46" r="9" fill="#FB7185"/>
  <circle cx="124.5" cy="42.5" r="3" fill="#FFE4E6" opacity=".95"/>
  <g stroke="#FB7185" stroke-width="4" stroke-linecap="round">
    <path d="M128 30 V24"/>
    <path d="M114 35 L110 31"/>
    <path d="M142 35 L146 31"/>
  </g>

  <!-- soft shadow -->
  <ellipse cx="128" cy="200" rx="50" ry="9" fill="#1E1B4B" opacity=".25"/>

  <!-- bell -->
  <path d="M128 76 C102 76 88 100 88 126 C88 148 82 158 73 165 C69 168 71 174 77 174 L179 174 C185 174 187 168 183 165 C174 158 168 148 168 126 C168 100 154 76 128 76 Z" fill="url(#bell)"/>
  <rect x="71" y="169" width="114" height="13" rx="6.5" fill="url(#bell)"/>
  <circle cx="128" cy="197" r="9" fill="url(#bell)"/>

  <!-- friendly face -->
  <g fill="#0891B2">
    <circle cx="114" cy="126" r="9"/>
    <circle cx="142" cy="126" r="9"/>
  </g>
  <g fill="#FFFFFF" opacity=".9">
    <circle cx="111" cy="123" r="3"/>
    <circle cx="139" cy="123" r="3"/>
  </g>
  <path d="M114 144 Q128 155 142 144" fill="none" stroke="#0891B2" stroke-width="5" stroke-linecap="round"/>
</svg>
