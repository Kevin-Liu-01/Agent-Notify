<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="t">
  <title id="t">Agent-Notify logo</title>
  <defs>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#042f2e"/>
      <stop offset="38%" stop-color="#0d9488"/>
      <stop offset="72%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="liquid-a" cx="28%" cy="22%" r="52%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#2dd4bf" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="liquid-b" cx="78%" cy="78%" r="48%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0d9488" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="liquid-c" cx="62%" cy="18%" r="36%">
      <stop offset="0%" stop-color="#ccfbf1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="12%" y1="8%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="18%" stop-color="#99f6e4" stop-opacity="0.22"/>
      <stop offset="42%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="68%" stop-color="#042f2e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5eead4" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="12%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="88%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#042f2e" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="0 0 0 0 0.05
                0 0 0 0 0.58
                0 0 0 0 0.53
                0 0 0 0.45 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="tile">
      <rect width="256" height="256" rx="56"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tile)">
    <rect width="256" height="256" fill="url(#base)"/>
    <rect width="256" height="256" fill="url(#liquid-a)"/>
    <rect width="256" height="256" fill="url(#liquid-b)"/>
    <rect width="256" height="256" fill="url(#liquid-c)"/>
    <rect width="256" height="256" fill="url(#sheen)" style="mix-blend-mode:soft-light"/>
    <rect width="256" height="256" fill="url(#edge)"/>
    <ellipse cx="72" cy="58" rx="54" ry="28" fill="#ccfbf1" opacity="0.14" transform="rotate(-18 72 58)"/>
    <ellipse cx="196" cy="198" rx="42" ry="24" fill="#0d9488" opacity="0.22" transform="rotate(12 196 198)"/>
  </g>

  <rect width="256" height="256" rx="56" fill="none" stroke="#5eead4" stroke-opacity="0.22" stroke-width="1.5"/>
  <rect x="1" y="1" width="254" height="254" rx="55" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>

  <g filter="url(#glow)">
    <line x1="128" y1="70" x2="128" y2="42" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <circle cx="128" cy="35" r="8" fill="#FFFFFF"/>
    <path d="M128 70 C108 70 92 86 92 114 C92 138 86 154 74 164 C70 167 72 174 79 174 L177 174 C184 174 186 167 182 164 C170 154 164 138 164 114 C164 86 148 70 128 70 Z" fill="#FFFFFF"/>
    <circle cx="128" cy="194" r="11" fill="#FFFFFF"/>
    <circle cx="114" cy="120" r="7" fill="#0d9488"/>
    <circle cx="142" cy="120" r="7" fill="#0d9488"/>
    <path d="M113 140 Q128 154 143 140" fill="none" stroke="#0d9488" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
